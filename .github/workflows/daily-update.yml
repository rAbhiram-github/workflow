name: Daily Update by 24f1002043@ds.study.iitm.ac.in

on:
  schedule:
    - cron: '45 3 * * *'  # Daily at 3:45 AM UTC (no wildcards)
  workflow_dispatch:  # Manual test button

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Key fix: Allows GITHUB_TOKEN to commit/push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # Full git history

      - name: Create update by 24f1002043@ds.study.iitm.ac.in
        run: |
          echo "Daily auto-update: $(date -u)" >> README.md  # Appends to existing file (safer)

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Daily update by 24f1002043@ds.study.iitm.ac.in: $(date -u)"
          git push
