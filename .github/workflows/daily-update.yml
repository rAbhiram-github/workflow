name: Daily Update by 24f1002043@ds.study.iitm.ac.in

on:
  schedule:
    - cron: '45 3 * * *'  # Daily at 3:45 AM UTC
  workflow_dispatch:  # Lets you test manually

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update log file by 24f1002043@ds.study.iitm.ac.in
        run: |
          echo "$(date) - Daily auto-update ran" >> update-log.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add update-log.txt
          git commit -m "Daily update: $(date)"
          git push
